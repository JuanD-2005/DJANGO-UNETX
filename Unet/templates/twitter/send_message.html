{% extends 'twitter/layout.html' %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-info text-white">
          <h2 class="mb-0">Enviar mensaje</h2>
        </div>
        <div class="card-body">
          <form method="POST">
            {% csrf_token %}
            <!-- Selección de destinatario -->
            <div class="form-group">
              <label for="receiver">Selecciona un usuario:</label>
              <select name="receiver" id="receiver" class="form-control" required>
                <option value="">-- Selecciona un usuario --</option>
                {% for user in following_users %}
                  <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
              </select>
            </div>
            
            <!-- Campo de texto para el mensaje -->
            <div class="form-group mt-3">
              <label for="content">Mensaje:</label>
              <textarea name="content" id="content" class="form-control" rows="4" maxlength="200" required></textarea>
            </div>
            
            <div class="form-group mt-3">
                <button type="submit" class="btn btn-primary" style="background-color: #383c44; border-color: #383c44; color: white;">Enviar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
