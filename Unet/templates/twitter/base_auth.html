{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnetX — {% block title %}{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="{% static 'img/tab-icons.png' %}" type="image/x-icon">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #07080f;
            --surface:     #0e1117;
            --card:        #13161f;
            --card-hi:     #1a1e2d;
            --border:      #1f2436;
            --border-hi:   #2d3456;
            --accent:      #4f8eff;
            --accent-dim:  rgba(79,142,255,0.12);
            --accent-glow: rgba(79,142,255,0.25);
            --purple:      #7c3aed;
            --text:        #e2e8f8;
            --text-2:      #8b96b8;
            --text-3:      #4a5470;
            --success:     #10b981;
            --danger:      #f43f5e;
            --warning:     #f59e0b;
            --radius:      16px;
            --radius-sm:   10px;
            --shadow:      0 8px 32px rgba(0,0,0,0.5);
            --font-display: 'Syne', sans-serif;
            --font-body:    'DM Sans', sans-serif;
            --transition:   0.2s cubic-bezier(0.4,0,0.2,1);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── LEFT PANEL — decorative ──────────────────────────────────────── */
        .auth-left {
            display: none;
            flex: 1;
            background: linear-gradient(135deg, #0a0c18 0%, #0e1a3a 50%, #0a0c18 100%);
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 900px) { .auth-left { display: flex; align-items: center; justify-content: center; } }

        .auth-left__inner {
            position: relative;
            z-index: 2;
            padding: 3rem;
            text-align: center;
        }
        .auth-left__logo {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            display: block;
        }
        .auth-left__tagline {
            font-size: 1.1rem;
            color: var(--text-2);
            max-width: 320px;
            line-height: 1.7;
        }

        /* Animated orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orb-drift 8s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(79,142,255,0.1); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(124,58,237,0.08); bottom: -80px; right: -80px; animation-delay: -3s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(79,142,255,0.06); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }
        @keyframes orb-drift {
            from { transform: translate(0, 0); }
            to   { transform: translate(30px, 20px); }
        }

        /* Grid pattern overlay */
        .auth-left::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(79,142,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,142,255,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 1;
        }

        /* ── RIGHT PANEL — form ───────────────────────────────────────────── */
        .auth-right {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            background: var(--surface);
            overflow-y: auto;
        }
        @media (min-width: 900px) {
            .auth-right { border-left: 1px solid var(--border); }
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            animation: fade-up 0.5s var(--transition) both;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-brand {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }
        .auth-subtitle {
            color: var(--text-2);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .auth-heading {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        /* ── Form elements ────────────────────────────────────────────────── */
        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-2);
            margin-bottom: 0.5rem;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            outline: none;
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: var(--accent);
            background: var(--card-hi);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .field input::placeholder { color: var(--text-3); }

        .field-error {
            font-size: 0.78rem;
            color: var(--danger);
            margin-top: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* ── Password strength ────────────────────────────────────────────── */
        .pwd-strength-wrap { margin-top: 0.5rem; display: flex; gap: 4px; }
        .pwd-bar {
            flex: 1;
            height: 3px;
            border-radius: 99px;
            background: var(--border);
            transition: background 0.3s;
        }
        .pwd-bar.weak   { background: var(--danger); }
        .pwd-bar.medium { background: var(--warning); }
        .pwd-bar.strong { background: var(--success); }

        /* ── Buttons ──────────────────────────────────────────────────────── */
        .btn-primary-auth {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--accent), #3a6fd8);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
            margin-top: 0.5rem;
        }
        .btn-primary-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
            opacity: 0.95;
        }
        .btn-primary-auth:active { transform: translateY(0); }

        /* ── Alert ────────────────────────────────────────────────────────── */
        .alert-err {
            padding: 0.75rem 1rem;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.3);
            border-radius: var(--radius-sm);
            color: #fca5a5;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        /* ── Footer link ──────────────────────────────────────────────────── */
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-3);
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }

        /* ── Divider ──────────────────────────────────────────────────────── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1rem 0;
            color: var(--text-3);
            font-size: 0.78rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    {# ── Left decorative panel ── #}
    <div class="auth-left">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="auth-left__inner">
            <span class="auth-left__logo">UnetX</span>
            <p class="auth-left__tagline">
                La red social construida diferente.<br>
                Rápida, limpia y tuya.
            </p>
        </div>
    </div>

    {# ── Right form panel ── #}
    <div class="auth-right">
        <div class="auth-card">
            <div class="auth-brand">UnetX</div>
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
